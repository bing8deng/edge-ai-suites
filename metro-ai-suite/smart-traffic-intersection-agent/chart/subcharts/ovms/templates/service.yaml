apiVersion: v1
kind: Service
metadata:
  name: {{ include "ovms.fullname" . }}
  labels:
    {{- include "ovms.labels" . | nindent 4 }}
    app.kubernetes.io/component: ovms
spec:
  {{- if .Values.trustedCompute.enabled }}
  type: ClusterIP
  {{- else }}
  type: {{ .Values.service.type }}
  {{- end }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: 8000
      protocol: TCP
  selector:
    app: {{ include "ovms.fullname" . }}
