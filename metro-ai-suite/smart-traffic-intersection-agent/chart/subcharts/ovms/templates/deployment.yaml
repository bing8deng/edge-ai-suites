{{- if and .Values.trustedCompute.enabled .Values.gpu.enabled -}}
{{- fail "Invalid configuration: trustedCompute.enabled and gpu.enabled cannot both be true. GPU is unsupported with Trusted Compute." -}}
{{- end -}}
{{- $targetDevice := ternary "GPU" .Values.env.targetDevice .Values.gpu.enabled -}}
{{- $needsGpu := contains "GPU" $targetDevice -}}
{{- $weightFormat := default (ternary "int4" "int8" (or (contains "GPU" $targetDevice) (contains "NPU" $targetDevice))) .Values.env.weightFormat -}}
{{- $sanitized := .Values.env.modelName | replace "/" "_" | replace ":" "_" | replace " " "_" -}}
{{- $isOpenvino := hasPrefix "OpenVINO/" .Values.env.modelName -}}
{{- $storageName := ternary (printf "%s_%s" $sanitized $targetDevice) (printf "%s_%s_%s" $sanitized $targetDevice $weightFormat) $isOpenvino -}}

apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ovms.fullname" . }}
  labels:
    {{- include "ovms.labels" . | nindent 4 }}
    app.kubernetes.io/component: ovms
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app: {{ include "ovms.fullname" . }}
  template:
    metadata:
      labels:
        app: {{ include "ovms.fullname" . }}
        {{- include "ovms.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: ovms
    spec:
      {{- if .Values.trustedCompute.enabled }}
      runtimeClassName: kata-qemu
      {{- end }}
      {{- if $needsGpu }}
      securityContext:
        supplementalGroups:
          {{- toYaml .Values.gpu.renderGroupIds | nindent 10 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        - name: ovms-model-init
          image: "{{ .Values.initImage.repository }}:{{ .Values.initImage.tag }}"
          imagePullPolicy: {{ .Values.initImage.pullPolicy }}
          command:
            - /bin/sh
            - -c
            - |
              # Storage-aware model detection
              vlm_storage_name="{{ $storageName }}"
              vlm_model_path="/models/${vlm_storage_name}"

              config_has_model() {
                grep -q "\"name\": \"$1\"" /models/config.json 2>/dev/null
              }

              needs_init=false

              if [ -f /models/config.json ]; then
                echo "Config file found, checking for OVMS model."
                if [ ! -d "${vlm_model_path}" ] || [ ! -f "${vlm_model_path}/graph.pbtxt" ]; then
                  echo "Model folder ${vlm_storage_name} not found. Will export."
                  needs_init=true
                elif ! config_has_model "${vlm_storage_name}"; then
                  echo "Model ${vlm_storage_name} not in config. Will export."
                  needs_init=true
                fi
                if [ "$needs_init" = false ]; then
                  echo "Model ${vlm_storage_name} already exists with correct config."
                fi
              else
                echo "No config.json found, building OVMS model repository."
                needs_init=true
              fi

              if [ "$needs_init" = true ]; then
                . /config/ovms-init.sh
              fi
          args:
            - {{ .Values.env.modelName | quote }}
            - {{ $weightFormat | quote }}
            - {{ .Values.huggingfaceToken | quote }}
            - {{ $targetDevice | quote }}
          env:
            - name: http_proxy
              value: {{ .Values.global.httpProxy | quote }}
            - name: https_proxy
              value: {{ .Values.global.httpsProxy | quote }}
            - name: no_proxy
              value: "{{ .Values.global.noProxy }},.svc,.svc.cluster.local,.cluster.local"
            - name: PIP_TRUSTED_HOST
              value: "storage.openvinotoolkit.org download.pytorch.org"
          {{- if .Values.trustedCompute.enabled }}
          resources:
            limits:
              cpu: {{ (.Values.resources.limits).cpu | default "6" | quote }}
              memory: {{ (.Values.resources.limits).memory | default "20Gi" | quote }}
            requests:
              cpu: {{ (.Values.resources.requests).cpu | default "4" | quote }}
              memory: {{ (.Values.resources.requests).memory | default "12Gi" | quote }}
          {{- else if or (.Values.resources.requests) (.Values.resources.limits) }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: ov-models
              mountPath: /models
            - name: init-script
              mountPath: /config
              readOnly: true
      containers:
        - name: ovms
          image: {{ include "ovms.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - "--port"
            - "9000"
            - "--rest_port"
            - "8000"
            - "--config_path"
            - "/models/config.json"
            - "--log_level"
            - {{ .Values.env.logLevel | quote }}
            - "--metrics_enable"
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: no_proxy
              value: "{{ .Values.global.noProxy }},.svc,.svc.cluster.local,.cluster.local,{{ include "ovms.fullname" . }}"
            - name: http_proxy
              value: {{ .Values.global.httpProxy | quote }}
            - name: https_proxy
              value: {{ .Values.global.httpsProxy | quote }}
          volumeMounts:
            - name: ov-models
              mountPath: /models
              readOnly: true
            {{- if $needsGpu }}
            - name: dri-device
              mountPath: /dev/dri
            {{- end }}
          livenessProbe:
            httpGet:
              path: /v2/health/live
              port: http
            initialDelaySeconds: {{ .Values.healthcheck.initialDelaySeconds }}
            periodSeconds: {{ .Values.healthcheck.periodSeconds }}
            timeoutSeconds: {{ .Values.healthcheck.timeoutSeconds }}
            failureThreshold: {{ .Values.healthcheck.failureThreshold }}
          readinessProbe:
            httpGet:
              path: /v2/health/ready
              port: http
            initialDelaySeconds: {{ .Values.healthcheck.initialDelaySeconds }}
            periodSeconds: {{ .Values.healthcheck.periodSeconds }}
            timeoutSeconds: {{ .Values.healthcheck.timeoutSeconds }}
            failureThreshold: {{ .Values.healthcheck.failureThreshold }}
          resources:
            {{- $res := deepCopy .Values.resources }}
            {{- if .Values.trustedCompute.enabled }}
            {{- $_ := set $res "requests" (merge (default dict (get $res "requests")) (dict "cpu" "4")) }}
            {{- $_ = set $res "limits" (merge (default dict (get $res "limits")) (dict "cpu" "6")) }}
            {{- end }}
            {{- if $needsGpu }}
            {{- $gpuLimits := dict .Values.gpu.resourceName (.Values.gpu.resourceLimit | int) }}
            {{- $_ := set $res "limits" (merge (default dict (get $res "limits")) $gpuLimits) }}
            {{- toYaml $res | nindent 12 }}
            {{- else }}
            {{- toYaml $res | nindent 12 }}
            {{- end }}
          securityContext:
            allowPrivilegeEscalation: false
      volumes:
        - name: ov-models
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "ovms.fullname" . }}-models
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: init-script
          configMap:
            name: {{ include "ovms.fullname" . }}-init-script
            defaultMode: 0755
        {{- if $needsGpu }}
        - name: dri-device
          hostPath:
            path: /dev/dri
            type: Directory
        {{- end }}
