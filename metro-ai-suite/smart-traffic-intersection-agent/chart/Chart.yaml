apiVersion: v2
name: smart-traffic-intersection-agent
description: A Helm chart for deploying the Smart Traffic Intersection Agent application
type: application
version: 2026.1.0703-helm
appVersion: "1.0.0"

dependencies:
  - name: ovms
    version: "2026.1.0703-helm"
    repository: "file://subcharts/ovms"
    condition: ovms.enabled

  - name: metrics-manager
    version: "2026.1.0703-helm"
    repository: "file://subcharts/metrics-manager"
    condition: metricsManager.enabled
    alias: metricsManager
