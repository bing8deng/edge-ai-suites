apiVersion: v1
kind: Service
metadata:
  name: {{ include "stia.trafficAgent.fullname" . }}
  labels:
    {{- include "stia.labels" . | nindent 4 }}
    app.kubernetes.io/component: traffic-agent
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: backend
      port: {{ .Values.service.backendPort }}
      targetPort: 8081
      protocol: TCP
    - name: ui
      port: {{ .Values.service.uiPort }}
      targetPort: 7860
      protocol: TCP
  selector:
    app: {{ include "stia.trafficAgent.fullname" . }}
