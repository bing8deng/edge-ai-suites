{{- if and .Values.tls.caCert (not .Values.tls.caCertSecretName) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "stia.fullname" . }}-ca-cert
  labels:
    {{- include "stia.labels" . | nindent 4 }}
type: Opaque
data:
  scenescape-ca.pem: {{ .Values.tls.caCert | b64enc | quote }}
{{- end }}
