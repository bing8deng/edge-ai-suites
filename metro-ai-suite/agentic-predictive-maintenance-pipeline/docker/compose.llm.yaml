# LLM service: OpenVINO Model Server (OVMS) with LLM plugin.
# Provides an OpenAI API-compatible endpoint (/v3/chat/completions) for agent reasoning.

services:
  apm-llm:
    image: openvino/model_server:${OVMS_TAG:-2026.2.1-gpu}
    container_name: apm-llm
    hostname: apm-llm
    # The mounted /model directory contains a pre-converted mediapipe graph
    # (graph.pbtxt) produced by scripts/download_llm_model.sh via the
    # model-download service — device/pipeline_type are already baked into it,
    # so only model_path/model_name/rest_port are valid here (anything else
    # is rejected with "unsupported model settings" by OVMS for graph-based
    # models).
    command: >
      --model_path /model
      --model_name ${LLM_MODEL_NAME:?LLM_MODEL_NAME must be set}
      --rest_port 8000
    environment:
      http_proxy: ${http_proxy:-}
      https_proxy: ${https_proxy:-}
      no_proxy: ${no_proxy:-},localhost
      HUGGINGFACE_TOKEN: ${HUGGINGFACEHUB_API_TOKEN:-}
    restart: unless-stopped
    devices:
      - /dev/dri:/dev/dri
    group_add:
      - ${USER_GROUP_ID:-1000}
      - ${VIDEO_GROUP_ID:-44}
      - ${RENDER_GROUP_ID:-1002}
    volumes:
      - ${LLM_MODEL_PATH}:/model:ro
    ports:
      - "${LLM_PORT:-8010}:8000"
    networks:
      - apm_network
    security_opt:
      - no-new-privileges
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/v1/config || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 40
      start_period: 30s
