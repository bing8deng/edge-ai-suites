# Base services: nginx, storage-service, model-download, mqtt-broker
# Always included regardless of use case.

networks:
  apm_network:
    driver: bridge

volumes:
  apm_sqlite_data:
    driver: local
  apm_model_cache:
    driver: local

services:
  nginx:
    image: nginx:1.27.5
    container_name: apm-nginx
    hostname: apm-nginx
    ports:
      - "${APP_HOST_PORT:-8080}:80"
    environment:
      http_proxy: ${http_proxy:-}
      https_proxy: ${https_proxy:-}
      no_proxy: ${no_proxy:-},apm-ui,apm-agent,apm-storage,localhost
    volumes:
      - ../config/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    depends_on:
      apm-ui:
        condition: service_started
      apm-storage:
        condition: service_healthy
    networks:
      - apm_network
    restart: unless-stopped
    security_opt:
      - no-new-privileges

  mqtt-broker:
    image: eclipse-mosquitto:2.0.18
    container_name: apm-mqtt-broker
    hostname: mqtt-broker
    ports:
      - "${MQTT_PORT:-1883}:1883"
    volumes:
      - ../config/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    networks:
      - apm_network
    restart: unless-stopped
    security_opt:
      - no-new-privileges
    healthcheck:
      test: ["CMD", "mosquitto_pub", "-h", "localhost", "-t", "health", "-m", "ping", "-q", "0"]
      interval: 10s
      timeout: 5s
      retries: 5

  apm-storage:
    image: ${REGISTRY:-intel/}apm-storage-service:${TAG:-1.0.0}
    container_name: apm-storage
    hostname: apm-storage
    build:
      context: ../services/storage-service
      dockerfile: Dockerfile
    environment:
      http_proxy: ${http_proxy:-}
      https_proxy: ${https_proxy:-}
      no_proxy: ${no_proxy:-},localhost
      APM_API_KEY: ${APM_API_KEY:-change-me-apm-key}
      SQLITE_DB_PATH: /data/detections.db
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - apm_sqlite_data:/data
    ports:
      - "${STORAGE_PORT:-5001}:5001"
    networks:
      - apm_network
    restart: unless-stopped
    security_opt:
      - no-new-privileges
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5001/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  dlstreamer-pipeline-server:
    image: ${DLSTREAMER_PIPELINE_SERVER_IMAGE:-intel/dlstreamer-pipeline-server:2026.1.0-ubuntu24-rc2}
    container_name: apm-dlstreamer
    hostname: dlstreamer-pipeline-server
    environment:
      http_proxy: ${http_proxy:-}
      https_proxy: ${https_proxy:-}
      no_proxy: ${no_proxy:-},mqtt-broker,apm-storage,localhost
      AppName: "APMPipelineServer"
      ENABLE_WEBRTC: false
      ENABLE_RTSP: false
      REST_SERVER_PORT: ${PIPELINE_SERVER_PORT:-8554}
      MQTT_HOST: mqtt-broker
      MQTT_PORT: 1883
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "${PIPELINE_SERVER_PORT:-8554}:${PIPELINE_SERVER_PORT:-8554}"
    volumes:
      - ${USE_CASE_CONFIGS_DIR:-/tmp/apm-placeholder}/pipeline-server-config.json:/home/pipeline-server/config.json:ro
      - ${USE_CASE_MODELS_DIR:-/tmp/models}:/home/pipeline-server/models:ro
      - ${USE_CASE_RESOURCES_DIR:-/tmp/resources}:/home/pipeline-server/resources:ro
      - apm_model_cache:/home/pipeline-server/model_cache
    tmpfs:
      - /tmp:rw,nosuid,nodev,size=1g
      - /var/cache/pipeline_root:uid=1999,gid=1999,mode=0755
    group_add:
      - "109"
      - "110"
      - "992"
    devices:
      - /dev/dri:/dev/dri
    depends_on:
      mqtt-broker:
        condition: service_healthy
    networks:
      - apm_network
    restart: unless-stopped
    security_opt:
      - no-new-privileges

  model-download:
    image: ${REGISTRY:-intel/}model-download:${MODEL_DOWNLOAD_TAG:-2026.1.0}
    container_name: apm-model-download
    hostname: model-download
    # The model-download entrypoint only accepts the plugin list via the
    # --plugins CLI flag — it does not read an ENABLED_PLUGINS env var.
    command: ["--plugins", "${MODEL_DOWNLOAD_PLUGINS:-huggingface,openvino}"]
    environment:
      http_proxy: ${http_proxy:-}
      https_proxy: ${https_proxy:-}
      no_proxy: ${no_proxy:-}
      HF_TOKEN: ${HUGGINGFACEHUB_API_TOKEN:-}
      HF_HUB_ENABLE_HF_TRANSFER: 1
      MODEL_PATH: /opt/models
    volumes:
      - ${USE_CASE_MODELS_DIR:-/tmp/models}:/opt/models
    ports:
      - "${MODEL_DOWNLOAD_PORT:-8200}:8000"
    networks:
      - apm_network
    restart: unless-stopped
    security_opt:
      - no-new-privileges
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 60s
      timeout: 10s
      retries: 5
      start_period: 180s
