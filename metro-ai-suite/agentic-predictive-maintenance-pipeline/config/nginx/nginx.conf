worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout 65;

    upstream ui_backend {
        server apm-ui:5003;
    }

    upstream agent_backend {
        server apm-agent:5002;
    }

    upstream storage_backend {
        server apm-storage:5001;
    }

    server {
        listen 80;
        server_name _;

        # UI — serve the web application
        location / {
            proxy_pass http://ui_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 300s;
        }

        # Agent API — /api/agents/* routed to agent-service /agents/*
        location /api/agents/ {
            proxy_pass http://agent_backend/agents/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 300s;
        }

        # Storage API — /api/storage/* routed to storage-service
        location /api/storage/ {
            proxy_pass http://storage_backend/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 60s;
        }
    }
}
