# Surgical Instrument UI — nginx reverse-proxy.
#
# Serves the Vite build and proxies /api/* (and legacy /health) to the
# surgical-backend service. SSE (/api/events) and MJPEG (/api/video_feed)
# require buffering off and long read timeouts.

server {
    listen       8080;
    listen  [::]:8080;
    server_name  _;

    # Static SPA bundle
    root   /usr/share/nginx/html;
    index  index.html;

    # Gzip text assets (keep off for media)
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # ---- Backend proxy --------------------------------------------------
    # Buffering off + long timeouts keep SSE and MJPEG streams flowing.
    location /api/ {
        proxy_pass         http://surgical-backend:5001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        proxy_buffering      off;
        proxy_cache          off;
        proxy_read_timeout   3600s;
        proxy_send_timeout   3600s;
        chunked_transfer_encoding on;
    }

    # Legacy healthcheck path used by the /health probe in ui/src/services/api.ts
    location = /health {
        proxy_pass http://surgical-backend:5001/api/health;
        proxy_set_header Host $host;
    }

    # ---- SPA fallback ---------------------------------------------------
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Small tweaks
    client_max_body_size 16m;
    server_tokens off;
}
