# Surgical Instrument — single-host deployment.
#
# Four services, one published host port (UI :8080):
#   surgical-mqtt      — Eclipse Mosquitto broker on the internal network
#   surgical-pipeline  — DL Streamer container, publishes detections+JPEG
#   surgical-backend   — Flask API, consumes MQTT + JPEG + latency tracer
#   surgical-ui        — Nginx reverse-proxy, only host-published service
#
# The backend runs the bootstrap → train → export → ready orchestrator on
# the host's Intel Arc iGPU, then serves the UI. Runtime polyp inference
# runs in the DL Streamer pipeline container and reaches the UI via the
# shared `surgical-frames` volume + MQTT topic `surgical/detections`.
#
# The UI does NOT come online until the backend HEALTHCHECK passes. First
# boot may take 20-35 min while YOLO11n trains on CVC-ColonDB — see
# docs/user-guide/quickstart.md for the manual dataset-drop instructions.
#
#   make up            # build + start (detached)
#   make logs          # follow logs
#   make down          # stop
#
# Override on the CLI:
#   make up UI_HOST_PORT=9090
#   make up DETECTION_DEVICE=GPU

name: surgical-instrument

networks:
  surgical-internal:
    driver: bridge

volumes:
  # Cache dir survives across restarts (Ultralytics weights, HF datasets, etc.)
  surgical-cache:
  # Shared JPEG + latency tracer between pipeline (rw) and backend (ro).
  surgical-frames:
  # Persistent SYCL / NEO kernel cache for the XPU trainer.
  surgical-sycl-cache:

services:

  surgical-mqtt:
    image: eclipse-mosquitto:2.0
    container_name: surgical-mqtt
    restart: unless-stopped
    networks: [surgical-internal]
    volumes:
      - ./configs/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_sub -h localhost -t '$$SYS/#' -C 1 -W 3 >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  surgical-pipeline:
    build:
      context: ./pipeline
      dockerfile: Dockerfile
      args:
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        NO_PROXY: ${NO_PROXY:-}
    image: surgical-pipeline:dev
    container_name: surgical-pipeline
    restart: unless-stopped
    networks: [surgical-internal]
    depends_on:
      surgical-mqtt:
        condition: service_healthy

    # Intel Arc iGPU passthrough for DL Streamer (VAAPI + OpenCL / Level Zero).
    # /dev/accel is the Meteor Lake NPU (accel0) — required when
    # DETECTION_DEVICE=NPU. Comment out on hosts without an NPU.
    group_add:
      - "${RENDER_GID:-992}"
      - "${VIDEO_GID:-44}"
    devices:
      - /dev/dri:/dev/dri
      - /dev/accel:/dev/accel

    # Grant the container permission to open v4l2 (video4linux2) character
    # devices — kernel major 81. This is a permission-only grant: without a
    # corresponding /dev/videoN bind-mount it does nothing, so hosts with no
    # USB camera boot normally. `make up` / `make run` auto-detect
    # /dev/video* at run-time and layer in a compose override that adds the
    # actual device passthroughs; the UI's Input Source picker is the
    # runtime selector.
    device_cgroup_rules:
      - 'c 81:* rmw'

    volumes:
      - ./models:/models:ro
      - ./videos:/videos:ro
      - surgical-frames:/frames

    environment:
      MQTT_HOST:   surgical-mqtt
      MQTT_PORT:   "1883"
      MQTT_TOPIC:  surgical/detections
      FRAME_DIR:   /frames
      VIDEO:       /videos/polyp_test.mp4
      IR_XML:      /models/yolo11n_polyp/best_openvino_model/best.xml
      # Customer requirement: 1080p @ 60 fps camera-to-screen.
      TARGET_FPS:  "60"
      THRESHOLD:   "0.5"

  surgical-backend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        NO_PROXY: ${NO_PROXY:-}
    image: surgical-backend:dev
    container_name: surgical-backend
    restart: unless-stopped
    networks: [surgical-internal]
    depends_on:
      surgical-mqtt:
        condition: service_healthy

    # torch DataLoader worker processes share tensors via /dev/shm; the
    # docker default (64 MB) is far too small and workers get SIGBUS.
    shm_size: "2gb"

    # Intel Arc iGPU passthrough for the bootstrap trainer (torch+xpu).
    # Runtime inference is now in surgical-pipeline; the backend does not
    # need the iGPU at serve time but the trainer does.
    group_add:
      - "${RENDER_GID:-992}"
      - "${VIDEO_GID:-44}"
    devices:
      - /dev/dri:/dev/dri
    # /dev/accel is Meteor Lake NPU; comment out on systems without it.
    # devices:
    #   - /dev/accel:/dev/accel

    volumes:
      # Trained IR + Ultralytics runs directory. Cache-first bootstrap
      # skips training when `.trained_ok` marker is present here.
      - ./models:/models
      # Manual-drop location for the CVC-ColonDB archive (see quickstart).
      - ./datasets:/datasets
      # Demo videos consumed by the pipeline container (path exposed via
      # /api/config for the UI).
      - ./videos:/videos
      # Weights / dataset download cache.
      - surgical-cache:/cache
      # Persistent SYCL / OpenCL kernel cache. Without this, every fresh
      # container recreate triggers 10-15 min of JIT compilation on Xe3.
      - surgical-sycl-cache:/root/.cache
      # Shared frames volume — pipeline writes JPEG + latency log; backend
      # reads them and must be able to unlink `latest.jpg` on Start so a
      # stale frame from a previous session (e.g. a Basler frame left over
      # after switching to a file source) is not served during the first
      # start-up second. Read-only would silently drop the unlink and leak
      # the old frame to the UI.
      - surgical-frames:/frames
      # Host OS release info — surfaced by /api/platform-info so the UI
      # reports the actual host distro (e.g. Ubuntu 25.10 on PTL) rather
      # than the backend container's baked-in image OS.
      - /etc/os-release:/host_etc/os-release:ro

    environment:
      BACKEND_CONFIG: /app/backend/config/model.yaml
      MODELS_DIR:     /models
      DATASETS_DIR:   /datasets
      VIDEOS_DIR:     /videos
      CACHE_DIR:      /cache
      HOST:           0.0.0.0
      PORT:           "5001"
      # Persist compiled SYCL kernels between container restarts so the
      # trainer only pays JIT cost once per host.
      SYCL_CACHE_PERSISTENT: "1"
      NEO_CACHE_PERSISTENT:  "1"
      # GPU | CPU | NPU — initial device for /api/device (can be changed
      # from the UI when inference is stopped).
      DETECTION_DEVICE: ${DETECTION_DEVICE:-GPU}
      # Consumer wiring — matches the surgical-pipeline container.
      MQTT_HOST:      surgical-mqtt
      MQTT_PORT:      "1883"
      MQTT_TOPIC:     surgical/detections
      PIPELINE_HOST:  surgical-pipeline
      PIPELINE_PORT:  "8000"
      FRAME_DIR:      /frames

    # start_period covers first-boot training (20-35 min on Arc iGPU).
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:5001/api/readiness || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45m

    # No `ports:` — backend is reachable only through the UI reverse-proxy.

  surgical-ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
    image: surgical-ui:dev
    container_name: surgical-ui
    restart: unless-stopped
    networks: [surgical-internal]

    # UI only starts once the backend reports readiness=true. This is the
    # "gate UI on BE ready" contract the architect signed off on: no
    # user-visible bootstrap UX; the URL simply doesn't answer until then.
    depends_on:
      surgical-backend:
        condition: service_healthy

    ports:
      - "${UI_HOST_PORT:-8080}:8080"   # ★ the ONLY host-published port ★

    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
