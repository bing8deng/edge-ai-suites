# Mosquitto broker — internal-only, password-authenticated.
# Listener bound only on the surgical-internal Docker bridge.

listener 1883 0.0.0.0
protocol mqtt

# Anonymous access disabled — clients MUST authenticate.
allow_anonymous false
password_file /mosquitto/config/passwd

# Persistence for queued messages on broker restart.
persistence true
persistence_location /mosquitto/data/

# Logging
log_dest stdout
log_type warning
log_type notice
log_type information

# Limits sized for a single-pipeline single-subscriber deployment.
max_connections 100
max_queued_messages 1000
message_size_limit 65536
