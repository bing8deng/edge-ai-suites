services:
  vllm-server:
    image: ${VLLM_IMAGE}
    container_name: vllm-server
    hostname: vllm-server
    restart: unless-stopped
    shm_size: ${VLLM_SHM_SIZE}
    devices:
      # Following devices under /dev filesystem will be needed based on usecase
      # dri - GPU
    - "${DRI_MOUNT_PATH:-/dev/null}:/dev/dri"
    group_add:
    # render group ID for ubuntu 20.04 host OS
    - "109"
    # render group ID for ubuntu 22.04 host OS
    - "110"
    # render group IDs for ubuntu 24.04 host OS
    - "992"
    - "993"
    volumes:
      - ${DRI_MOUNT_PATH:-/dev/null}:/dev/dri:ro
      - "/run/udev:/run/udev:ro"
      - ./configs/vllm/models:/lora-adapters
      - ./configs/vllm/huggingface:/root/.cache/huggingface
    environment:
      VLLM_WORKER_MULTIPROC_METHOD: ${VLLM_WORKER_MULTIPROC_METHOD}
      no_proxy: "${no_proxy},${HOST_IP},seaweedfs-filer"
      NO_PROXY: "${no_proxy},${HOST_IP},seaweedfs-filer"
      # Disable all outbound Hugging Face / Transformers network calls so the
      # container uses only the locally mounted model files. This prevents
      # unintended internet access and ensures reproducible, air-gapped deployments.
      HF_HUB_OFFLINE: "1"
      TRANSFORMERS_OFFLINE: "1"
      VLLM_LOGGING_LEVEL: ${LOG_LEVEL}
    command:
      - vllm
      - serve
      - ${VLLM_MODEL_NAME}
      - --dtype=${VLLM_DTYPE}
      - --enforce-eager
      - --port
      - ${VLLM_PORT}
      - --block-size
      - ${VLLM_BLOCK_SIZE}
      - --gpu-memory-utilization
      - ${VLLM_GPU_MEMORY_UTILIZATION}
      - --no-enable-prefix-caching
      - --trust-remote-code
      - --max-num-batched-tokens=${VLLM_MAX_NUM_BATCHED_TOKENS}
      - --max-model-len
      - ${VLLM_MAX_MODEL_LEN}
      - --served-model-name
      - ${VLLM_SERVED_MODEL_NAME}
      - --enable-lora
      - --lora-modules
      - ${VLLM_ADAPTER_NAME}=/lora-adapters/qwen3.5-2b-vlm-weld-explainability-lora/
      - -tp=${VLLM_TENSOR_PARALLEL_SIZE}
      - --quantization
      - ${VLLM_QUANTIZATION}
      - --attention-backend
      - TRITON_ATTN
    networks:
      - timeseries_network
      
  ia-insights-workbench:
    container_name: ia-insights-workbench
    hostname: ia-insights-workbench
    image: ${DOCKER_REGISTRY}intel/ia-insights-workbench:${IMAGE_SUFFIX:-latest}${WEEKLY_BUILD_DATE:+-${WEEKLY_BUILD_DATE}}${WEEKLY_BUILD_DATE:+-weekly}
    build:
      context: $PWD/insights-workbench
      dockerfile: $PWD/insights-workbench/Dockerfile
    restart: unless-stopped
    depends_on:
      - ia-influxdb
    security_opt:
    - no-new-privileges
    read_only: false
    environment:
      no_proxy: "ia-influxdb,vllm-server,${no_proxy},seaweedfs-filer"
      NO_PROXY: "ia-influxdb,vllm-server,${no_proxy},seaweedfs-filer"
      INFLUX_HOST: ia-influxdb
      INFLUX_PORT: 8086
      INFLUX_USER: ${INFLUXDB_USERNAME}
      INFLUX_PASSWORD: ${INFLUXDB_PASSWORD}
      INFLUX_DB: datain
      FUSION_MEASUREMENT: fusion_result
      OBJECT_STORE_URL: http://seaweedfs-filer:8888
      BUCKET_NAME: dlstreamer-pipeline-results/weld-defect-classification
      VLLM_HOST: vllm-server
      VLLM_PORT: ${VLLM_PORT}
      VLLM_CLIENT_TEMPERATURE: ${VLLM_CLIENT_TEMPERATURE}
      VLLM_CLIENT_TOKEN: ${VLLM_CLIENT_TOKEN}
      VLLM_CLIENT_MIN_P: ${VLLM_CLIENT_MIN_P}
      VLLM_ADAPTER_NAME: ${VLLM_ADAPTER_NAME}
    networks:
      - timeseries_network